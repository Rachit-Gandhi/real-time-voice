<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agent Console</title>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1e2130;
      --border:    #2d3348;
      --text:      #e4e8f0;
      --muted:     #7a84a0;
      --accent:    #5b78f5;
      --user-bg:   #1a2a3a;
      --ai-bg:     #1a2a1a;
      --error:     #e05252;
      --success:   #4cbb7f;
      --warn:      #f0a84a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.disconnected { background: var(--muted); }
    .dot.connecting   { background: var(--warn); animation: pulse 1s infinite; }
    .dot.connected    { background: var(--success); }
    .dot.error        { background: var(--error); }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: #3a1a1a;
      border-bottom: 1px solid var(--error);
      color: #f08080;
      font-size: 13px;
      padding: 8px 20px;
      flex-shrink: 0;
    }

    /* ── Controls bar ── */
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #controls input, #controls select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
    }
    #controls input:focus, #controls select:focus {
      border-color: var(--accent);
    }
    #user-id { width: 130px; }

    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:not(:disabled):hover { opacity: 0.85; }

    #btn-start { background: var(--accent); color: #fff; }
    #btn-stop  { background: var(--error);  color: #fff; display: none; }

    #session-info {
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
    }

    /* ── Transcript ── */
    #transcript-section {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #transcript-section h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 20px 4px;
      flex-shrink: 0;
    }
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #transcript:empty::after {
      content: 'Transcript will appear here once you start a call.';
      color: var(--muted);
      font-size: 13px;
      margin-top: 16px;
    }

    .msg {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.55;
    }
    .msg .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .msg.user { background: var(--user-bg); align-self: flex-start; border-bottom-left-radius: 3px; }
    .msg.ai   { background: var(--ai-bg);   align-self: flex-end;   border-bottom-right-radius: 3px; }
    .msg.ai .label { text-align: right; }

    /* ── Tool call log ── */
    #tool-log {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
      max-height: 200px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #tool-log summary {
      padding: 8px 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      list-style: none;
    }
    #tool-log summary::before { content: '▶ '; }
    #tool-log[open] summary::before { content: '▼ '; }
    #tool-log[open] { max-height: 200px; }
    #tool-entries {
      overflow-y: auto;
      padding: 0 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tool-entry {
      font-size: 12px;
      font-family: monospace;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tool-entry .ts { color: var(--border); }
    .tool-entry .arrow-out { color: var(--warn); }
    .tool-entry .arrow-in  { color: var(--success); }
    .tool-entry .arrow-err { color: var(--error); }
    .tool-entry b { color: var(--text); }
    #tool-count { font-weight: normal; }
  </style>
</head>
<body>

<header>
  <h1>🎙️ Voice Agent Console</h1>
  <div class="status-pill">
    <span id="status-dot" class="dot disconnected"></span>
    <span id="status-label">disconnected</span>
  </div>
</header>

<div id="error-banner"></div>

<section id="controls">
  <input id="user-id" type="text" value="user-1" placeholder="User ID" />
  <select id="agent-id">
    <option value="agent_one">agent_one</option>
  </select>
  <button id="btn-start" onclick="startCall()">📞 Start Call</button>
  <button id="btn-stop"  onclick="stopCall()">🔴 End Call</button>
  <span id="session-info"></span>
</section>

<section id="transcript-section">
  <h2>Transcript</h2>
  <div id="transcript" aria-live="polite"></div>
</section>

<details id="tool-log">
  <summary>Tool Calls <span id="tool-count">(0)</span></summary>
  <div id="tool-entries"></div>
</details>

<audio id="remote-audio" autoplay playsinline></audio>

<script>
  'use strict';

  // ── State ────────────────────────────────────────────────────────────────
  let pc         = null;   // RTCPeerConnection
  let dc         = null;   // DataChannel
  let micStream  = null;   // MediaStream from getUserMedia
  let sessionId  = null;
  let toolCount  = 0;

  // Current in-progress transcript elements (updated by delta events)
  let currentUserEl = null;
  let currentAiEl   = null;

  // ── Entry points ──────────────────────────────────────────────────────────
  async function startCall() {
    setStatus('connecting');
    setBtnEnabled('start', false);
    clearError();
    clearTranscript();

    try {
      // 1. Create session on voice-wrapper
      const sessResp = await fetch('/voice/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          agent_id: document.getElementById('agent-id').value,
          user_id:  document.getElementById('user-id').value,
        }),
      });

      if (!sessResp.ok) {
        const err = await sessResp.json().catch(() => ({}));
        throw new Error(err.detail || `Session creation failed (HTTP ${sessResp.status})`);
      }

      const session  = await sessResp.json();
      sessionId      = session.session_id;
      const secret   = session.client_secret;
      const model    = session.realtime?.model || session.realtime?.session?.model || 'gpt-4o-realtime-preview';

      document.getElementById('session-info').textContent = `session: ${sessionId.slice(0, 8)}…`;

      if (!secret) throw new Error('No client_secret in session response — check OPENAI_API_KEY in voice-wrapper .env');

      // 2. Microphone
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        throw new Error('Microphone access denied — please allow mic access and try again.');
      }

      // 3. PeerConnection
      pc = new RTCPeerConnection();

      pc.ontrack = e => {
        const audio = document.getElementById('remote-audio');
        if (e.streams[0]) audio.srcObject = e.streams[0];
      };

      pc.onconnectionstatechange = () => {
        if (pc?.connectionState === 'failed') showError('WebRTC connection failed.');
        if (pc?.connectionState === 'disconnected') stopCall();
      };

      // 4. Mic tracks
      micStream.getAudioTracks().forEach(t => pc.addTrack(t, micStream));

      // 5. Data channel
      dc = pc.createDataChannel('oai-events');
      dc.addEventListener('open',    onDataChannelOpen);
      dc.addEventListener('message', e => handleEvent(JSON.parse(e.data)));
      dc.addEventListener('close',   () => { if (sessionId) stopCall(); });

      // 6. SDP offer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering (max 4 s)
      await new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') return resolve();
        const tid = setTimeout(resolve, 4000);
        pc.addEventListener('icegatheringstatechange', function check() {
          if (pc.iceGatheringState === 'complete') {
            clearTimeout(tid);
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        });
      });

      // 7. Exchange SDP with OpenAI Realtime (GA: POST /v1/realtime/calls, raw SDP body)
      const sdpResp = await fetch(
        'https://api.openai.com/v1/realtime/calls',
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${secret}`,
            'Content-Type': 'application/sdp',
          },
          body: pc.localDescription.sdp,
        }
      );

      if (!sdpResp.ok) {
        const body = await sdpResp.text();
        throw new Error(`OpenAI rejected SDP (${sdpResp.status}): ${body}`);
      }

      await pc.setRemoteDescription({ type: 'answer', sdp: await sdpResp.text() });

      setStatus('connected');
      document.getElementById('btn-stop').style.display  = 'inline-block';
      document.getElementById('btn-start').style.display = 'none';

    } catch (err) {
      showError(err.message);
      setStatus('error');
      setBtnEnabled('start', true);
      cleanup();
    }
  }

  function stopCall() {
    if (sessionId) {
      fetch(`/voice/session/${sessionId}/end`, { method: 'POST' }).catch(() => {});
    }
    cleanup();
    sessionId = null;
    setStatus('disconnected');
    document.getElementById('session-info').textContent = '';
    document.getElementById('btn-stop').style.display  = 'none';
    document.getElementById('btn-start').style.display = 'inline-block';
    setBtnEnabled('start', true);
  }

  function cleanup() {
    if (dc)        { try { dc.close(); }  catch {} dc = null; }
    if (pc)        { try { pc.close(); }  catch {} pc = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    const audio = document.getElementById('remote-audio');
    audio.srcObject = null;
    currentUserEl = null;
    currentAiEl   = null;
  }

  function setMicEnabled(enabled) {
    if (micStream) micStream.getAudioTracks().forEach(t => { t.enabled = enabled; });
  }

  // ── Data channel ──────────────────────────────────────────────────────────
  function onDataChannelOpen() {
    // gpt-realtime-2 GA schema: audio config nested under audio.input / audio.output
    dc.send(JSON.stringify({
      type: 'session.update',
      session: {
        type: 'realtime',
        audio: {
          input: {
            transcription: { model: 'whisper-1' },
            turn_detection: {
              type: 'server_vad',
              threshold: 0.5,
              prefix_padding_ms: 300,
              silence_duration_ms: 500,
            },
          },
        },
      },
    }));
  }

  function handleEvent(event) {
    switch (event.type) {

      // User speech
      case 'input_audio_buffer.speech_started':
        currentUserEl = addMsg('user', '');
        break;

      case 'conversation.item.input_audio_transcription.delta':
        if (!currentUserEl) currentUserEl = addMsg('user', '');
        appendText(currentUserEl, event.delta || '');
        break;

      case 'conversation.item.input_audio_transcription.completed':
        if (currentUserEl) { setText(currentUserEl, event.transcript || ''); currentUserEl = null; }
        break;

      // AI speech
      case 'response.created':
        currentAiEl = addMsg('ai', '');
        setMicEnabled(false);
        break;

      case 'response.audio_transcript.delta':
        if (!currentAiEl) currentAiEl = addMsg('ai', '');
        appendText(currentAiEl, event.delta || '');
        break;

      case 'response.audio_transcript.done':
        if (currentAiEl) { setText(currentAiEl, event.transcript || ''); currentAiEl = null; }
        break;

      // Tool calls
      case 'response.done':
        handleToolCalls(event.response?.output || []);
        setMicEnabled(true);
        break;

      case 'error':
        showError(event.error?.message || JSON.stringify(event.error));
        break;
    }
  }

  async function handleToolCalls(outputs) {
    for (const item of outputs) {
      if (item.type !== 'function_call') continue;

      let args = {};
      try { args = JSON.parse(item.arguments || '{}'); } catch {}

      addToolEntry('out', item.name, args.user_message || item.arguments);

      let outputPayload;
      try {
        const res = await fetch(`/voice/session/${sessionId}/tool-call`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tool_name: item.name, args }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        addToolEntry('in', item.name, data.answer || data.speak || JSON.stringify(data));
        outputPayload = JSON.stringify(data);

      } catch (err) {
        addToolEntry('err', item.name, err.message);
        outputPayload = JSON.stringify({ error: err.message });
      }

      // Return result to Realtime session
      dc.send(JSON.stringify({
        type: 'conversation.item.create',
        item: {
          type: 'function_call_output',
          call_id: item.call_id,
          output: outputPayload,
        },
      }));
      dc.send(JSON.stringify({ type: 'response.create' }));
    }
  }

  // ── Transcript helpers ────────────────────────────────────────────────────
  function addMsg(role, text) {
    const box   = document.getElementById('transcript');
    const div   = document.createElement('div');
    div.className = 'msg ' + role;
    const lbl   = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = role === 'user' ? '🎤 You' : '🤖 Agent';
    const body  = document.createElement('div');
    body.className = 'body';
    body.textContent = text;
    div.appendChild(lbl);
    div.appendChild(body);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  function appendText(div, delta) {
    div.querySelector('.body').textContent += delta;
    const box = document.getElementById('transcript');
    box.scrollTop = box.scrollHeight;
  }

  function setText(div, text) {
    div.querySelector('.body').textContent = text;
  }

  function clearTranscript() {
    document.getElementById('transcript').innerHTML = '';
    document.getElementById('tool-entries').innerHTML = '';
    toolCount = 0;
    document.getElementById('tool-count').textContent = '(0)';
    document.getElementById('tool-log').open = false;
  }

  // ── Tool log helpers ──────────────────────────────────────────────────────
  function addToolEntry(dir, name, detail) {
    toolCount++;
    document.getElementById('tool-count').textContent = `(${toolCount})`;
    document.getElementById('tool-log').open = true;

    const entry  = document.createElement('div');
    entry.className = 'tool-entry';
    const ts     = new Date().toLocaleTimeString();
    const arrowClass = dir === 'out' ? 'arrow-out' : dir === 'in' ? 'arrow-in' : 'arrow-err';
    const arrow  = dir === 'out' ? '→' : dir === 'in' ? '←' : '⚠';
    entry.innerHTML =
      `<span class="ts">${ts}</span> ` +
      `<span class="${arrowClass}">${arrow}</span> ` +
      `<b>${esc(name)}</b>: ` +
      `<span>${esc(String(detail))}</span>`;

    const container = document.getElementById('tool-entries');
    container.appendChild(entry);
    container.scrollTop = container.scrollHeight;
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setStatus(s) {
    document.getElementById('status-dot').className   = 'dot ' + s;
    document.getElementById('status-label').textContent = s;
  }

  function setBtnEnabled(which, enabled) {
    document.getElementById('btn-' + which).disabled = !enabled;
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function clearError() {
    document.getElementById('error-banner').style.display = 'none';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
